<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | CaptionStudio</title>
    <meta name="description" content="{{ page.description }}">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 750px; margin: 0 auto; padding: 20px; background: #fafafa; color: #333; }
        .blog-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 30px; }
        h1 { font-size: 32px; color: #111; margin-bottom: 10px; line-height: 1.3; }
        .meta-info { color: #777; font-size: 14px; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .post-body { font-size: 18px; line-height: 1.8; color: #444; }
        .post-body h2 { font-size: 24px; color: #222; margin-top: 30px; }
        footer { text-align: center; margin-top: 5px; padding: 20px; color: #999; font-size: 14px; }
    </style>
</head>
<body>

    <div class="blog-card">
        <h1>{{ page.title }}</h1>
        <div class="meta-info">Published on: {{ page.date | date_to_string }} | By {{ page.author }}</div>
        
        <div class="post-body">
            {{ content }}
        </div>
    </div>

    <footer>© 2026 CaptionStudio.in | All Rights Reserved.</footer>

</body>
</html>
