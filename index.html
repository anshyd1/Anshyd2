<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarkari Photo AI Verifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #f0f2f5; -webkit-tap-highlight-color: transparent; }
        #outputCanvas { max-width: 100%; height: auto; border-radius: 8px; }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen antialiased">

    <!-- COMPACT VIEWPORT CONTAINER -->
    <main class="w-full max-w-md bg-white min-h-screen shadow-2xl relative overflow-x-hidden flex flex-col">
        
        <!-- HEADER -->
        <header class="bg-indigo-700 p-6 text-white shrink-0">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04kM12 21.48l-.392-.232a12.81 12.81 0 01-4.7-3.66 12.81 12.81 0 01-3.21-7.588L12 21.48z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Sarkari Photo AI</h1>
                    <p class="text-xs text-indigo-100 opacity-80">Official Form Compliant Verifier</p>
                </div>
            </div>
        </header>

        <!-- SELECTION VIEW -->
        <section id="selectionView" class="p-5 space-y-6 flex-grow overflow-y-auto no-scrollbar">
            
            <div class="bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-2xl p-8 text-center relative">
                <input type="file" id="photoInput" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                <div id="uploadPrompt">
                    <div class="bg-indigo-600 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                    </div>
                    <p class="text-indigo-900 font-semibold text-sm">Tap to Upload Photo</p>
                    <p class="text-indigo-400 text-xs mt-1">JPEG, PNG up to 10MB</p>
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Select Exam Portal</label>
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="setPreset('upsc')" class="preset-btn flex items-center justify-between p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-500 hover:bg-indigo-50 transition-all bg-white shadow-sm" id="btn-upsc">
                        <span class="font-medium text-slate-700 text-sm">UPSC (350 x 350)</span>
                        <span class="text-[10px] bg-slate-100 px-2 py-1 rounded-md text-slate-500 uppercase">Square</span>
                    </button>
                    <button onclick="setPreset('ssc')" class="preset-btn flex items-center justify-between p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-500 hover:bg-indigo-50 transition-all bg-white shadow-sm" id="btn-ssc">
                        <span class="font-medium text-slate-700 text-sm">SSC (413 x 531)</span>
                        <span class="text-[10px] bg-slate-100 px-2 py-1 rounded-md text-slate-500 uppercase">Portrait</span>
                    </button>
                    <button onclick="setPreset('ibps')" class="preset-btn flex items-center justify-between p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-500 hover:bg-indigo-50 transition-all bg-white shadow-sm" id="btn-ibps">
                        <span class="font-medium text-slate-700 text-sm">IBPS (531 x 413)</span>
                        <span class="text-[10px] bg-slate-100 px-2 py-1 rounded-md text-slate-500 uppercase">Landscape</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- DASHBOARD VIEW (HIDDEN INITIALLY) -->
        <section id="aiDashboard" class="hidden p-5 space-y-6 flex-grow animate-fade-in">
            <div id="previewBox" class="relative w-full aspect-square bg-slate-200 rounded-2xl overflow-hidden flex items-center justify-center border-4 border-white shadow-inner">
                <!-- CANVAS INJECTED HERE -->
                <canvas id="outputCanvas"></canvas>
                
                <div id="verifiedShield" class="hidden absolute top-4 right-4 bg-green-500 text-white p-2 rounded-full shadow-lg border-2 border-white animate-bounce">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 4.946-2.597 9.284-6.512 11.722L10 18.954l-1.488-.231C4.596 16.284 2 11.946 2 7.001c0-.681.057-1.35.166-2.002zm7.547 2.12a1 1 0 00-1.428 1.414l3.92 3.92-3.92 3.92a1 1 0 001.428 1.414l3.92-3.92 3.92 3.92a1 1 0 001.428-1.414l-3.92-3.92 3.92-3.92a1 1 0 00-1.428-1.414l-3.92 3.92-3.92-3.92z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Original Size</p>
                    <p id="originalSize" class="text-lg font-bold text-slate-700">0 KB</p>
                </div>
                <div class="bg-indigo-50 p-4 rounded-xl shadow-sm border border-indigo-100">
                    <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Target Safety</p>
                    <p id="processedSize" class="text-lg font-bold text-indigo-700">&lt; 44 KB</p>
                </div>
            </div>

            <button id="downloadTrigger" class="hidden w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
                Download Verified Photo
            </button>

            <button onclick="window.location.reload()" class="w-full text-slate-400 font-medium py-2 text-sm">Start Over</button>
        </section>

        <!-- FOOTER -->
        <footer class="p-6 text-center shrink-0">
            <p class="text-[10px] text-slate-400 leading-relaxed uppercase tracking-tighter">
                Compliant with NIC, NTA & Recruitment Cell Standards<br>
                Powered by Local Device AI Inference
            </p>
        </footer>

    </main>

    <script>
        const state = {
            preset: null,
            image: null,
            fileName: 'processed-photo.jpg'
        };

        const presets = {
            upsc: { w: 350, h: 350 },
            ssc: { w: 413, h: 531 },
            ibps: { w: 531, h: 413 }
        };

        // 1. STATE CONTROL LOGIC: INITIALIZATION
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            state.fileName = file.name.split('.')[0] + '_verified.jpg';
            const reader = new FileReader();
            
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    state.image = img;
                    document.getElementById('originalSize').innerText = `${(file.size / 1024).toFixed(1)} KB`;
                    processImage();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function setPreset(p) {
            state.preset = p;
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('border-indigo-600', 'bg-indigo-50'));
            document.getElementById(`btn-${p}`).classList.add('border-indigo-600', 'bg-indigo-50');
            if (state.image) processImage();
        }

        // 2. HTML5 CANVAS OPTIMIZATION ENGINE
        async function processImage() {
            if (!state.image || !state.preset) {
                if (!state.preset) alert("Please select an Exam Portal first");
                return;
            }

            // Reveal UI Elements
            document.getElementById('selectionView').classList.add('hidden');
            document.getElementById('aiDashboard').classList.remove('hidden');
            document.getElementById('previewBox').classList.remove('hidden');

            const config = presets[state.preset];
            const canvas = document.getElementById('outputCanvas');
            const ctx = canvas.getContext('2d');

            canvas.width = config.w;
            canvas.height = config.h;

            // Apply Structural Context Filters
            ctx.filter = 'brightness(1.05) contrast(1.03)';
            
            // Proportional Draw (Cover Logic)
            const scale = Math.max(canvas.width / state.image.width, canvas.height / state.image.height);
            const x = (canvas.width / 2) - (state.image.width / 2) * scale;
            const y = (canvas.height / 2) - (state.image.height / 2) * scale;
            
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(state.image, x, y, state.image.width * scale, state.image.height * scale);

            // 3. CRASH-SAFE MEMORY LOOP
            let quality = 0.95;
            let finalDataUrl = '';
            let currentSizeKB = 0;

            // Iterative Compression Engine
            while (quality > 0.1) {
                finalDataUrl = canvas.toDataURL('image/jpeg', quality);
                currentSizeKB = (finalDataUrl.length * 0.75) / 1024;

                if (currentSizeKB <= 44) {
                    break;
                }
                quality -= 0.08; // Aggressive step reduction
            }

            // 4. DOWNSTREAM TRIGGERS
            document.getElementById('processedSize').innerText = `${currentSizeKB.toFixed(1)} KB`;
            document.getElementById('verifiedShield').classList.remove('hidden');
            document.getElementById('downloadTrigger').classList.remove('hidden');

            const dlBtn = document.getElementById('downloadTrigger');
            dlBtn.onclick = () => {
                const link = document.createElement('a');
                link.download = state.fileName;
                link.href = finalDataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
        }
    </script>
</body>
    </html>
